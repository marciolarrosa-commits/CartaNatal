<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Universo Estelar — Carta Natal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#06090f;--surf:#0d1117;--surf2:#161b22;--brd:#21262d;
  --gold:#c9a84c;--gold2:#f0d080;--txt:#e6edf3;--dim:#8b949e;--red:#f85149;
}
html,body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;}

/* ── Splash ── */
#splash{position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at center,#1a0a2e 0%,#08050f 70%,#000 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .8s,visibility .8s;}
#splash.out{opacity:0;visibility:hidden;}
#splash img{width:min(280px,60vw);border-radius:16px;animation:sPulse 2s ease-in-out infinite;box-shadow:0 0 60px rgba(140,70,255,.45);}
@keyframes sPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
#splash-bar{margin-top:20px;width:min(200px,45vw);height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
#splash-fill{height:100%;width:0;background:linear-gradient(90deg,#7c3aed,#c9a84c,#7c3aed);background-size:200%;animation:sfill 5s linear forwards,shimmer 1.5s linear infinite;}
@keyframes sfill{to{width:100%}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
#splash-txt{margin-top:10px;font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.2em;color:rgba(201,168,76,.7);text-transform:uppercase;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}

/* ── Loading ── */
#ov{display:none;position:fixed;inset:0;z-index:500;background:rgba(6,9,15,.92);
  backdrop-filter:blur(6px);flex-direction:column;align-items:center;justify-content:center;gap:14px;}
#ov.on{display:flex;}
.spinner{width:44px;height:44px;border:3px solid var(--brd);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#ov-msg{color:var(--dim);font-size:.84rem;font-family:'Cinzel',serif;letter-spacing:.08em;}

/* ═══════════════ FORM ═══════════════ */
#pg-form{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;position:relative;z-index:1;}
.form-hero{text-align:center;margin-bottom:24px;}
.form-hero h1{font-family:'Cinzel',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  background:linear-gradient(135deg,var(--gold),var(--gold2),#fff8e0,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.form-hero p{color:var(--dim);font-size:.78rem;letter-spacing:.09em;text-transform:uppercase;}
.form-card{background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:24px 32px;width:100%;max-width:460px;}
.field{margin-bottom:10px;}
label{display:block;font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:4px;}
input,select{width:100%;background:var(--surf2);border:1px solid var(--brd);border-radius:7px;color:var(--txt);padding:9px 11px;font-size:.86rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;}
input:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.12);}
select option{background:var(--surf2);}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator{display:none !important;}
input[type=date],input[type=time]{-webkit-appearance:none;appearance:none;}
.btn{width:100%;padding:12px;border:none;border-radius:9px;
  background:linear-gradient(135deg,#b8860b,var(--gold),#c9a84c);color:#05080f;
  font-family:'Cinzel',serif;font-size:.9rem;font-weight:700;letter-spacing:.08em;
  cursor:pointer;margin-top:5px;transition:opacity .2s,transform .1s;box-shadow:0 4px 18px rgba(201,168,76,.3);}
.btn:hover{opacity:.92;transform:translateY(-2px);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.err{color:var(--red);font-size:.76rem;margin-top:6px;display:none;text-align:center;}

/* ═══════════════ RESULT — layout fijo 100vh ═══════════════ */
#pg-result{
  display:none;
  height:100vh;
  max-height:100vh;
  overflow:hidden;
  padding:5px 7px 5px;
  position:relative;z-index:1;
  display:none;
  flex-direction:column;
  gap:4px;
}
#pg-result.show{display:flex;}

/* ── Barra superior ── */
.topbar{
  display:flex;align-items:center;gap:8px;
  height:38px;flex-shrink:0;
}
.back-btn{
  background:var(--surf2);border:1px solid var(--brd);border-radius:6px;
  padding:5px 11px;color:var(--dim);font-size:.72rem;cursor:pointer;white-space:nowrap;
  transition:all .18s;flex-shrink:0;height:28px;display:flex;align-items:center;
}
.back-btn:hover{border-color:var(--gold);color:var(--gold);}
.title-center{flex:1;text-align:center;}
.main-title{
  font-family:'Cinzel',serif;
  font-size:clamp(1rem,2.2vw,1.7rem);
  font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  background:linear-gradient(135deg,var(--gold),var(--gold2),#fff8e0,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:block;line-height:1;
}
.sub-title{font-size:.63rem;color:var(--dim);letter-spacing:.04em;margin-top:2px;}
.spacer{width:70px;flex-shrink:0;}

/* ── Grid principal ── */
/* 3 cols: datos+planetas | rueda | casas+resumen+interp */
.main-grid{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:200px 1fr 236px;
  gap:6px;
  overflow:hidden;
}

/* ── Columna izquierda ── */
.col-left{display:flex;flex-direction:column;gap:5px;overflow:hidden;}

/* card genérico */
.card{background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:7px 8px;flex-shrink:0;}
.card.grow{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;}
.ct{font-family:'Cinzel',serif;font-size:.54rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--gold);margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--brd);flex-shrink:0;}

/* Datos persona */
.pname{font-family:'Cinzel',serif;font-size:1.2rem;font-weight:700;color:var(--gold2);margin-bottom:6px;letter-spacing:.04em;line-height:1.1;}
.irow{display:flex;gap:5px;margin-bottom:3px;line-height:1.35;}
.ilbl{color:var(--dim);width:52px;font-size:.72rem;text-transform:uppercase;letter-spacing:.02em;flex-shrink:0;}
.ival{color:var(--txt);font-size:.82rem;}

/* Tabla planetas */
.pt{width:100%;border-collapse:collapse;}
.pt td{padding:2px 2px;font-size:.72rem;vertical-align:middle;border-bottom:1px solid rgba(33,38,45,.4);}
.pt tr:last-child td{border-bottom:none;}
.pt .sym{font-size:.82rem;width:14px;text-align:center;}
.pt .nm{color:var(--dim);width:56px;font-size:.7rem;}
.pt .dg{font-weight:600;font-size:.65rem;}
.pt .sg{font-size:.72rem;}
.pt .hs{color:var(--dim);font-size:.68rem;text-align:right;white-space:nowrap;}
.ret{font-size:.52rem;color:#f0b040;}

/* Luna */
.luna-box{font-size:.78rem;line-height:1.65;color:var(--dim);}
.luna-box strong{color:var(--txt);}
.luna-ico{font-size:1.2rem;display:block;margin-bottom:2px;}

/* ── Columna central ── */
.col-center{display:flex;flex-direction:column;gap:4px;overflow:hidden;}
.wheel-wrap{background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:5px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.wheel-wrap canvas{display:block;}

/* Big 3 — fila compacta */
.big3{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;flex-shrink:0;}
.b3c{background:var(--surf);border:1px solid var(--brd);border-radius:7px;padding:5px;text-align:center;}
.b3l{font-size:.52rem;letter-spacing:.07em;text-transform:uppercase;color:var(--dim);margin-bottom:2px;}
.b3g{font-size:1.25rem;display:block;margin-bottom:1px;}
.b3n{font-family:'Cinzel',serif;font-size:.68rem;color:var(--gold2);}
.b3d{font-size:.57rem;color:var(--dim);}

/* Logo + contacto — fila horizontal */
.logo-contact{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo-img{height:56px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.contact-links{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.clink{display:inline-flex;align-items:center;gap:5px;background:var(--surf2);
  border:1px solid var(--brd);border-radius:6px;padding:6px 11px;
  color:var(--txt);text-decoration:none;font-size:.74rem;transition:all .15s;}
.clink:hover{border-color:var(--gold);color:var(--gold);}
.clink svg{width:14px;height:14px;flex-shrink:0;}
.clink-wa svg{color:#25D366;}.clink-ig svg{color:#E1306C;}.clink-fb svg{color:#1877F2;}.clink-yt svg{color:#FF0000;}.clink-em svg{color:var(--gold);}

/* ── Columna derecha ── */
.col-right{display:flex;flex-direction:column;gap:5px;overflow:hidden;}

/* Tabla casas */
.ht{width:100%;border-collapse:collapse;}
.ht td{padding:2px 2px;font-size:.73rem;vertical-align:middle;border-bottom:1px solid rgba(33,38,45,.4);}
.ht tr:last-child td{border-bottom:none;}
.ht .hn{font-weight:600;font-size:.7rem;width:48px;white-space:nowrap;}
.ht .hd{font-weight:600;width:38px;font-size:.73rem;}
.ht .hsg{font-size:.73rem;}
.hmc{background:rgba(201,168,76,.07)!important;}
.hmc td{color:var(--gold)!important;}

/* Resumen */
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.si{background:var(--surf2);border-radius:4px;padding:4px 7px;display:flex;justify-content:space-between;align-items:center;font-size:.72rem;}
.si span:first-child{color:var(--dim);}
.si strong{color:var(--gold2);font-size:.78rem;}

/* Interpretación */
.interp{font-size:.78rem;line-height:1.7;color:var(--dim);overflow:auto;flex:1;}

/* Sign colors */
.s0{color:#e05050}.s1{color:#6cc06c}.s2{color:#60b0e0}.s3{color:#e0c040}
.s4{color:#e06020}.s5{color:#80c080}.s6{color:#b050b0}.s7{color:#c04040}
.s8{color:#9060d0}.s9{color:#5090c0}.s10{color:#50c0d0}.s11{color:#8060c0}

@media(max-width:860px){
  html,body{overflow:auto;height:auto;}
  #pg-result{height:auto;overflow:auto;padding:8px;}
  #pg-result.show{display:block;}
  .main-grid{grid-template-columns:1fr;height:auto;}
  .col-center{order:1;}.col-left{order:2;}.col-right{order:3;}
  .logo-contact{flex-wrap:wrap;}
}
</style>
</head>

<script>
const SIGNS=['Aries','Tauro','Geminis','Cancer','Leo','Virgo','Libra','Escorpio','Sagitario','Capricornio','Acuario','Piscis'];
const GLIFOS=['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const SCOLS=['#e05050','#6cc06c','#60b0e0','#e0c040','#e06020','#80c080','#b050b0','#c04040','#9060d0','#5090c0','#50c0d0','#8060c0'];
const PCOLS={Sun:'#FFD700',Moon:'#C8E6FA',Mercury:'#98FB98',Venus:'#FFB6C1',Mars:'#FF6B6B',Jupiter:'#FFA500',Saturn:'#CD853F',Uranus:'#00CED1',Neptune:'#9370DB',Pluto:'#DA70D6',NNode:'#90EE90',Chiron:'#DDA0DD'};
const P_ORDER=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','NNode','Chiron'];
const SYS_NAMES={P:'Placidus',K:'Koch',E:'Casas Iguales',W:'Signo Completo',R:'Regiomontanus',C:'Campanus'};
const COUNTRY_TZ={UY:'America/Montevideo',AR:'America/Argentina/Buenos_Aires',BR:'America/Sao_Paulo',CL:'America/Santiago',PY:'America/Asuncion',PE:'America/Lima',CO:'America/Bogota',EC:'America/Guayaquil',VE:'America/Caracas',BO:'America/La_Paz',MX:'America/Mexico_City',GT:'America/Guatemala',CR:'America/Costa_Rica',PA:'America/Panama',CU:'America/Havana',DO:'America/Santo_Domingo',PR:'America/Puerto_Rico',US:'America/New_York',CA:'America/Toronto',ES:'Europe/Madrid',PT:'Europe/Lisbon',FR:'Europe/Paris',DE:'Europe/Berlin',IT:'Europe/Rome',GB:'Europe/London',RU:'Europe/Moscow',JP:'Asia/Tokyo',CN:'Asia/Shanghai',IN:'Asia/Kolkata',AU:'Australia/Sydney'};
const PAIS_MAP={'uruguay':'UY','argentina':'AR','brasil':'BR','brazil':'BR','chile':'CL','paraguay':'PY','peru':'PE','colombia':'CO','ecuador':'EC','venezuela':'VE','bolivia':'BO','mexico':'MX','espana':'ES','spain':'ES','portugal':'PT','france':'FR','francia':'FR','germany':'DE','alemania':'DE','italy':'IT','italia':'IT','uk':'GB','united kingdom':'GB','reino unido':'GB','usa':'US','estados unidos':'US','canada':'CA','australia':'AU','japan':'JP','china':'CN','india':'IN'};

function getTzName(cc,lon){return COUNTRY_TZ[cc]||(()=>{const o=Math.round(lon/15);return o>=0?'Etc/GMT-'+o:'Etc/GMT+'+Math.abs(o);})();}
function getTzOffset(d,tz){try{const pts=new Intl.DateTimeFormat('en-US',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).formatToParts(d);const p={};pts.forEach(x=>p[x.type]=x.value);const h=parseInt(p.hour==='24'?0:p.hour);return(Date.UTC(parseInt(p.year),parseInt(p.month)-1,parseInt(p.day),h,parseInt(p.minute))-d.getTime())/3600000;}catch(e){return 0;}}
function localToUTC(yr,mo,dy,hh,mm,tz){let g=Date.UTC(yr,mo-1,dy,hh,mm,0);for(let i=0;i<8;i++){const pts=new Intl.DateTimeFormat('en-US',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).formatToParts(new Date(g));const p={};pts.forEach(x=>p[x.type]=x.value);const dH=parseInt(p.hour==='24'?0:p.hour);const diff=Date.UTC(yr,mo-1,dy,hh,mm,0)-Date.UTC(parseInt(p.year),parseInt(p.month)-1,parseInt(p.day),dH,parseInt(p.minute));if(!diff)break;g+=diff;}return new Date(g);}
async function geocode(ciudad,pais){const q=pais?ciudad+', '+pais:ciudad;const r=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=1&addressdetails=1',{headers:{'Accept-Language':'es','User-Agent':'UniversoEstelar/1.0'}});const d=await r.json();if(!d.length)throw new Error('Ciudad no encontrada: '+q);const lat=parseFloat(d[0].lat),lon=parseFloat(d[0].lon);const addr=d[0].address||{};let cc=(addr.country_code||'').toUpperCase();if(!cc&&pais)cc=PAIS_MAP[pais.toLowerCase().trim()]||'';return{lat,lon,cc};}

function goBack(){document.getElementById('pg-result').classList.remove('show');document.getElementById('pg-result').style.display='none';document.getElementById('pg-form').style.display='flex';window.scrollTo(0,0);}

async function generar(){
  const nombre=document.getElementById('f-nombre').value.trim();
  const fecha=document.getElementById('f-fecha').value;
  const hora=document.getElementById('f-hora').value||'12:00';
  const pais=document.getElementById('f-pais').value.trim();
  const ciudad=document.getElementById('f-ciudad').value.trim();
  const sistema=document.getElementById('f-sistema').value;
  const errEl=document.getElementById('err-msg');errEl.style.display='none';
  if(!fecha||!ciudad){errEl.textContent='Completa fecha y ciudad.';errEl.style.display='block';return;}
  const btn=document.getElementById('btn-gen');btn.disabled=true;
  const ov=document.getElementById('ov');ov.classList.add('on');
  const msgs=['Geocodificando...','Zona horaria...','Motor astronomico...','Casas Placidus...','Interpretacion...'];
  let mi=0;const mEl=document.getElementById('ov-msg');
  const iv=setInterval(()=>{mEl.textContent=msgs[Math.min(mi++,msgs.length-1)];},1200);
  try{
    const{lat,lon,cc}=await geocode(ciudad,pais);
    const tzName=getTzName(cc,lon);
    const[yr,mo,dy]=fecha.split('-').map(Number);
    const[hh,mm]=hora.split(':').map(Number);
    const utcDate=localToUTC(yr,mo,dy,hh,mm,tzName);
    const tzOffset=getTzOffset(utcDate,tzName);
    const resp=await fetch(window.location.origin+'/api/chart',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre,fecha,hora,ciudad,pais,lat,lon,tzName,tzOffset,sistema})});
    if(!resp.ok){const e=await resp.json();throw new Error(e.error||'Error servidor');}
    const data=await resp.json();
    clearInterval(iv);mEl.textContent='Interpretacion...';
    const interp=await getInterp(nombre,data.chart,{...data.meta,tzName,tzOffset});
    ov.classList.remove('on');
    renderResult(data,interp,{lat,lon,tzName,tzOffset});
  }catch(err){clearInterval(iv);ov.classList.remove('on');errEl.textContent='Error: '+err.message;errEl.style.display='block';}
  btn.disabled=false;}

function dms(p){return p.deg+'°'+String(p.min).padStart(2,'0')+"'";}
function hexRgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return'rgba('+r+','+g+','+b+','+a+')';}
function hexRgb(h){return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16);}

function renderResult(data,interp,geo){
  const{meta,chart}=data;const{lat,lon,tzName,tzOffset}=geo;
  const[yr,mo,dy]=meta.fecha.split('-').map(Number);
  document.getElementById('pg-form').style.display='none';
  const res=document.getElementById('pg-result');res.style.display='flex';res.classList.add('show');
  window.scrollTo(0,0);
  document.getElementById('r-nombre').textContent=meta.nombre||'Carta Natal';
  document.getElementById('r-meta').textContent=dy+' de '+MESES[mo-1]+' '+yr+' · '+meta.hora+' · '+meta.ciudad+(meta.pais?', '+meta.pais:'');
  document.getElementById('i-date').textContent=dy+' de '+MESES[mo-1]+' de '+yr;
  document.getElementById('i-time').textContent=meta.hora+' hs';
  document.getElementById('i-city').textContent=meta.ciudad;
  document.getElementById('i-country').textContent=meta.pais||'—';
  document.getElementById('i-coords').textContent=Math.abs(lat).toFixed(3)+(lat>=0?'N':'S')+' '+Math.abs(lon).toFixed(3)+(lon>=0?'E':'W');
  document.getElementById('i-tz').textContent=(tzOffset>=0?'+':'')+tzOffset+'h ('+tzName.split('/').pop().replace(/_/g,' ')+')';
  document.getElementById('i-sys').textContent=SYS_NAMES[meta.house_system]||meta.house_system;
  buildPlanets(chart);buildLuna(chart);buildBig3(chart);buildHouses(chart);buildSummary(chart);
  document.getElementById('interp-text').textContent=interp;
  // Dibujar rueda en el siguiente frame para que el layout ya esté calculado
  // Calcular tamaño de rueda y dibujar
  (function tryDraw(tries){
    const wrap=document.getElementById('wheel-wrap');
    const canvas=document.getElementById('wheel');
    const wRect=wrap.getBoundingClientRect();
    // La rueda ocupa la columna central menos: topbar(44)+big3(72)+logo(50)+contacto(42)+gaps(30) ≈ 238
    const availH=window.innerHeight-260;
    const availW=wRect.width>20?wRect.width-10:400;
    const sz=Math.min(availW,availH,700);
    if(sz<120&&tries<10){setTimeout(()=>tryDraw(tries+1),100);return;}
    // Fijar el contenedor al tamaño correcto ANTES de dibujar
    wrap.style.height=(sz+10)+'px';
    wrap.style.flex='none';
    drawWheel(chart,sz);
  })(0);
}

function buildPlanets(c){
  document.getElementById('p-rows').innerHTML=P_ORDER.map(k=>{const p=c.planets[k];if(!p)return'';
    const col=PCOLS[k]||'#e0e0e0';
    return'<tr><td class="sym" style="color:'+col+'">'+p.symbol+'</td><td class="nm">'+p.name+'</td><td class="dg" style="color:'+col+'">'+dms(p)+'</td><td class="sg"><span class="s'+p.sign_idx+'">'+p.glyph+'</span> '+p.sign+'</td><td class="hs">C'+p.house+(p.retrograde?'<span class="ret">R</span>':'')+'</td></tr>';}).filter(Boolean).join('');}

function buildLuna(c){
  const mp=c.moon_phase;
  const icons={'Luna Nueva':'🌑','Cuarto Creciente':'🌓','Gibosa Creciente':'🌔','Luna Llena':'🌕','Gibosa Menguante':'🌖','Cuarto Menguante':'🌗','Menguante Balsamica':'🌘'};
  document.getElementById('luna-box').innerHTML='<span class="luna-ico">'+(icons[mp.phase]||'🌙')+'</span><strong>'+mp.phase+'</strong><br>Ilum: '+mp.illumination+'% · Edad: '+mp.age+' días';}

function buildBig3(c){
  const items=[{p:c.planets.Sun,lbl:'Signo Solar'},{p:c.planets.Moon,lbl:'Signo Lunar'},{p:c.asc,lbl:'Ascendente'}];
  document.getElementById('big3').innerHTML=items.map(it=>{if(!it.p)return'';const col=SCOLS[it.p.sign_idx];
    return'<div class="b3c"><div class="b3l">'+it.lbl+'</div><span class="b3g" style="color:'+col+'">'+it.p.glyph+'</span><div class="b3n">'+it.p.sign+'</div><div class="b3d">'+dms(it.p)+'</div></div>';}).join('');}

function buildHouses(c){
  const mc=c.mc;
  let h='<tr class="hmc"><td class="hn">MC</td><td class="hd" style="color:'+SCOLS[mc.sign_idx]+'">'+dms(mc)+'</td><td class="hsg"><span class="s'+mc.sign_idx+'">'+mc.glyph+'</span> '+mc.sign+'</td></tr>';
  const lbl={1:'Asc',4:'IC',7:'Dsc'};
  c.houses.forEach(x=>{const ax=[1,4,7,10].includes(x.house);
    h+='<tr'+(ax?' style="background:rgba(201,168,76,.04)"':'')+'><td class="hn"><b>C'+x.house+'</b>'+(lbl[x.house]?' <small style="color:var(--dim)">'+lbl[x.house]+'</small>':'')+'</td><td class="hd" style="color:'+SCOLS[x.sign_idx]+'">'+dms(x)+'</td><td class="hsg"><span class="s'+x.sign_idx+'">'+x.glyph+'</span> '+x.sign+'</td></tr>';});
  document.getElementById('h-rows').innerHTML=h;}

function buildSummary(c){
  const s=c.summary;
  document.getElementById('sum-grid').innerHTML=[['Fuego',s.elements.fire],['Tierra',s.elements.earth],['Aire',s.elements.air],['Agua',s.elements.water],['Cardinal',s.modalities.cardinal],['Fijo',s.modalities.fixed],['Mutable',s.modalities.mutable],['Masculina',s.polarity.masculine],['Femenina',s.polarity.feminine]].map(([n,v])=>'<div class="si"><span>'+n+'</span><strong>'+v+'</strong></div>').join('');}

function drawWheel(chart,sz){
  const canvas=document.getElementById('wheel');
  if(!sz||sz<120)return;
  canvas.width=sz;canvas.height=sz;
  const ctx=canvas.getContext('2d');
  const W=sz,cx=W/2,cy=W/2;
  const R=W*.455,rP1=R*.856,rP0=R*.67,rS1=rP0,rS0=R*.488,rH1=rS0,rH0=R*.308;
  ctx.clearRect(0,0,W,W);
  ctx.beginPath();ctx.arc(cx,cy,R+1,0,Math.PI*2);ctx.fillStyle='#070b12';ctx.fill();
  const ascLon=chart.asc.lon,mcLon=chart.mc.lon;
  const ca=lon=>(180-((lon-ascLon+360)%360))*Math.PI/180;
  // Ticks
  for(let d=0;d<360;d++){const isMaj=d%30===0,isMid=d%10===0,is5=d%5===0;const tl=isMaj?(R-rP1)*.9:isMid?(R-rP1)*.6:is5?(R-rP1)*.33:(R-rP1)*.14;const a=ca(d);ctx.beginPath();ctx.moveTo(cx+(R-tl)*Math.cos(a),cy+(R-tl)*Math.sin(a));ctx.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));ctx.strokeStyle=isMaj?'#4a5568':'#1e2533';ctx.lineWidth=isMaj?1.2:.5;ctx.stroke();}
  // Planet band
  ctx.beginPath();ctx.arc(cx,cy,rP1,0,Math.PI*2);ctx.fillStyle='#0b0f1a';ctx.fill();ctx.strokeStyle='#2d3748';ctx.lineWidth=.8;ctx.stroke();
  // Sign band
  const SBGS=['#1c0f0f','#0f1c0f','#0f1219','#1c1a0f','#1c1009','#0f190f','#180f1c','#1a0f0f','#150f1c','#0f1619','#0f0f1c','#190f17'];
  const gSz=Math.round(W*.063);
  for(let i=0;i<12;i++){const a1=ca(i*30),a2=ca((i+1)*30);ctx.beginPath();ctx.arc(cx,cy,rS1,a1,a2,true);ctx.arc(cx,cy,rS0,a2,a1,false);ctx.closePath();ctx.fillStyle=SBGS[i];ctx.fill();ctx.strokeStyle='#2d3748';ctx.lineWidth=.7;ctx.stroke();
    const ma=ca(i*30+15),gr=(rS0+rS1)/2;ctx.font='bold '+gSz+'px serif';ctx.fillStyle=SCOLS[i];ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(GLIFOS[i],cx+gr*Math.cos(ma),cy+gr*Math.sin(ma));
    const nr=gr+gSz*.52;ctx.font=Math.round(W*.014)+'px Inter,sans-serif';ctx.fillStyle='rgba('+hexRgb(SCOLS[i])+',0.48)';ctx.fillText(SIGNS[i].slice(0,3).toUpperCase(),cx+nr*Math.cos(ma),cy+nr*Math.sin(ma));
    const ba=ca(i*30);ctx.beginPath();ctx.moveTo(cx+rS0*Math.cos(ba),cy+rS0*Math.sin(ba));ctx.lineTo(cx+rS1*Math.cos(ba),cy+rS1*Math.sin(ba));ctx.strokeStyle='#4a5568';ctx.lineWidth=.8;ctx.stroke();}
  ctx.beginPath();ctx.arc(cx,cy,rS0,0,Math.PI*2);ctx.strokeStyle='#4a5568';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,rS1,0,Math.PI*2);ctx.strokeStyle='#4a5568';ctx.lineWidth=1;ctx.stroke();
  // House ring
  ctx.beginPath();ctx.arc(cx,cy,rH1,0,Math.PI*2);ctx.fillStyle='#090d15';ctx.fill();ctx.strokeStyle='#2d3748';ctx.lineWidth=.8;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,rH1,0,Math.PI*2);ctx.fillStyle='#0a0e18';ctx.fill();
  for(let h=0;h<12;h++){const a=ca(chart.houses[h].lon),isAx=[0,3,6,9].includes(h);ctx.beginPath();ctx.moveTo(cx+rH0*Math.cos(a),cy+rH0*Math.sin(a));ctx.lineTo(cx+rH1*Math.cos(a),cy+rH1*Math.sin(a));ctx.strokeStyle=isAx?'#c9a84c':'#3d4a5c';ctx.lineWidth=isAx?1.8:.8;ctx.stroke();
    const midA=ca((chart.asc.lon+h*30+15)%360);ctx.font='bold '+Math.round(W*.027)+'px Inter';ctx.fillStyle=isAx?'#c9a84c':'#6b7280';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(h+1,cx+((rH0+rH1)/2)*Math.cos(midA),cy+((rH0+rH1)/2)*Math.sin(midA));}
  ctx.beginPath();ctx.arc(cx,cy,rH0,0,Math.PI*2);ctx.strokeStyle='#2d3748';ctx.lineWidth=.8;ctx.stroke();
  // Axes
  [[ascLon,'AC'],[(ascLon+180)%360,'DC'],[mcLon,'MC'],[(mcLon+180)%360,'IC']].forEach(([lon,lbl])=>{const a=ca(lon);ctx.beginPath();ctx.moveTo(cx+rH0*Math.cos(a),cy+rH0*Math.sin(a));ctx.lineTo(cx+rS0*Math.cos(a),cy+rS0*Math.sin(a));ctx.strokeStyle='#c9a84c';ctx.lineWidth=2.2;ctx.stroke();ctx.font='bold '+Math.round(W*.02)+'px Inter';ctx.fillStyle='#c9a84c';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(lbl,cx+(rH1-W*.03)*Math.cos(a),cy+(rH1-W*.03)*Math.sin(a));});
  const mcA=ca(mcLon);ctx.font='bold '+Math.round(W*.018)+'px Inter';ctx.fillStyle='#c9a84c';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('MC '+chart.mc.deg+'°'+String(chart.mc.min).padStart(2,'0')+"'",cx+(R-W*.019)*Math.cos(mcA),cy+(R-W*.019)*Math.sin(mcA));
  // Planets
  const plist=P_ORDER.map(k=>{const p=chart.planets[k];if(!p)return null;return{key:k,p,baseA:ca(p.lon),drawA:ca(p.lon)};}).filter(Boolean);
  const MIN_GAP=0.19;for(let it=0;it<30;it++){let mv=false;for(let i=0;i<plist.length;i++)for(let j=i+1;j<plist.length;j++){let df=plist[j].drawA-plist[i].drawA;if(df>Math.PI)df-=2*Math.PI;if(df<-Math.PI)df+=2*Math.PI;if(Math.abs(df)<MIN_GAP){const push=(MIN_GAP-Math.abs(df))/2+.003;plist[i].drawA-=push*(df<0?-1:1);plist[j].drawA+=push*(df<0?-1:1);mv=true;}}if(!mv)break;}
  const symR=(rP0+rP1)/2,symSz=Math.round(W*.05);
  // Aspect lines — conectan los SÍMBOLOS de los planetas (radio symR), no el anillo de casas.
  // Esto hace que las líneas realmente atraviesen el centro de planeta a planeta, en vez de
  // quedar confinadas a un círculo pequeño que deja un hueco hasta los símbolos.
  const ASPC={0:['rgba(210,100,255,1)',[],2.2],60:['rgba(90,190,255,1)',[5,3],1.8],90:['rgba(255,75,75,1)',[],2.2],120:['rgba(255,255,255,1)',[],2.8],150:['rgba(255,210,70,1)',[4,3],1.5],180:['rgba(255,120,120,1)',[7,4],1.8]};
  const radByKey={};plist.forEach(pl=>radByKey[pl.key]={a:pl.drawA});
  chart.aspects.forEach(asp=>{const r1=radByKey[asp.p1],r2=radByKey[asp.p2];if(!r1||!r2)return;const cfg=ASPC[asp.angle]||['rgba(255,255,255,.3)',[],1];
    ctx.beginPath();ctx.moveTo(cx+symR*Math.cos(r1.a),cy+symR*Math.sin(r1.a));ctx.lineTo(cx+symR*Math.cos(r2.a),cy+symR*Math.sin(r2.a));
    ctx.strokeStyle=cfg[0];ctx.lineWidth=cfg[2];ctx.setLineDash(cfg[1]);ctx.stroke();ctx.setLineDash([]);});
  plist.forEach(({key,p,baseA,drawA})=>{const col=PCOLS[key]||'#e0e0e0';const px=cx+symR*Math.cos(drawA),py=cy+symR*Math.sin(drawA);
    ctx.beginPath();ctx.moveTo(cx+rP1*Math.cos(baseA),cy+rP1*Math.sin(baseA));ctx.lineTo(cx+R*Math.cos(baseA),cy+R*Math.sin(baseA));ctx.strokeStyle=hexRgba(col,.44);ctx.lineWidth=.9;ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+rP0*Math.cos(baseA),cy+rP0*Math.sin(baseA));ctx.lineTo(cx+rS1*Math.cos(baseA),cy+rS1*Math.sin(baseA));ctx.strokeStyle=hexRgba(col,.24);ctx.lineWidth=.6;ctx.stroke();
    if(Math.abs(drawA-baseA)>0.015){ctx.beginPath();ctx.moveTo(cx+rP1*Math.cos(baseA),cy+rP1*Math.sin(baseA));ctx.lineTo(px,py);ctx.strokeStyle=hexRgba(col,.18);ctx.lineWidth=.5;ctx.stroke();}
    ctx.font='bold '+symSz+'px serif';ctx.fillStyle=col;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.symbol,px,py);
    const lx=cx+(symR-W*.037)*Math.cos(drawA),ly=cy+(symR-W*.037)*Math.sin(drawA);
    ctx.font=Math.round(W*.018)+'px serif';ctx.fillStyle=SCOLS[p.sign_idx];ctx.fillText(GLIFOS[p.sign_idx],lx,ly);
    ctx.font=Math.round(W*.013)+'px Inter';ctx.fillStyle='#9ca3af';ctx.fillText(p.deg+'°'+String(p.min).padStart(2,'0')+"'"+(p.retrograde?'R':''),lx,ly+W*.018);});}

async function getInterp(nombre,chart,meta){
  const p=chart.planets;const f=k=>p[k]?p[k].sign+' '+p[k].deg+'°'+String(p[k].min).padStart(2,'0')+"' (C"+p[k].house+')':'-';
  const prompt='Sos un astrologo experto y empatico. Escribe una interpretacion astrologica personalizada en espanol, entre 120 y 150 palabras. Sin asteriscos ni markdown, prosa calida y directa.\n\nNombre: '+(nombre||'la consultante')+'\nFecha: '+meta.fecha+' '+meta.hora+', '+meta.ciudad+'\nSol: '+f('Sun')+'\nLuna: '+f('Moon')+'\nAsc: '+chart.asc?.sign+' '+chart.asc?.deg+'°'+String(chart.asc?.min).padStart(2,'0')+"'\nMercurio: "+f('Mercury')+'\nVenus: '+f('Venus')+'\nMarte: '+f('Mars')+'\nJupiter: '+f('Jupiter')+'\nSaturno: '+f('Saturn');
  try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:800,messages:[{role:'user',content:prompt}]})});const d=await r.json();return d.content?.[0]?.text||(nombre||'La consultante')+' nace con el Sol en '+(p.Sun?.sign||'-')+'.';}catch(e){return(nombre||'La consultante')+' nace con el Sol en '+(p.Sun?.sign||'-')+', la Luna en '+(p.Moon?.sign||'-')+' y el Ascendente en '+chart.asc?.sign+'.';}
}

(function(){document.body.style.overflow='hidden';const s=document.getElementById('splash');setTimeout(()=>{s.classList.add('out');document.body.style.overflow='';setTimeout(()=>s.style.display='none',900);},5000);})();
</script>
</body>
